<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TipBoard</title>
  <script>
    // GitHub Pages SPA redirect — encodes the path into a query param so
    // index.html can read it and restore the correct Angular route.
    // pathSegmentsToKeep = 1 preserves the /SPC26/ repo segment.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
