<div class="shell">

  <!-- Mobile overlay -->
  @if (sidebarOpen()) {
    <div class="sidebar-overlay" (click)="closeSidebar()"></div>
  }

  <!-- Sidebar -->
  <aside class="sidebar" [class.is-open]="sidebarOpen()">

    <!-- Brand -->
    <div class="brand">
      <span class="brand-name">TIPBOARD</span>
      <span class="brand-sub">SPC26 · 2026</span>
    </div>

    <!-- Primary nav -->
    <nav class="nav-group">
      <a class="nav-item"
         routerLink="/"
         routerLinkActive="is-active"
         [routerLinkActiveOptions]="{ exact: true }"
         (click)="closeSidebar()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </a>

      <a class="nav-item"
         routerLink="/rounds"
         routerLinkActive="is-active"
         (click)="closeSidebar()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="3" y1="15" x2="21" y2="15"/>
          <line x1="9" y1="9" x2="9" y2="21"/>
        </svg>
        <span class="nav-label">Results Table</span>
      </a>
    </nav>

    <!-- Admin section -->
    <div class="nav-section">
      <span class="nav-section-label">Admin</span>
      <nav class="nav-group">

        <a class="nav-item nav-item--admin"
           routerLink="/admin/users"
           routerLinkActive="is-active"
           (click)="closeSidebar()">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <circle cx="9" cy="7" r="4"/>
            <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            <path d="M21 21v-2a4 4 0 0 0-3-3.87"/>
          </svg>
          <span class="nav-label">Users</span>
          <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
        </a>

        <a class="nav-item nav-item--admin"
           routerLink="/admin/bets"
           routerLinkActive="is-active"
           (click)="closeSidebar()">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
          <span class="nav-label">Bet Results</span>
          <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
        </a>

      </nav>
    </div>

    <!-- Bottom: auth -->
    <div class="sidebar-footer">
      @if (auth.isAuthenticated) {
        <div class="auth-status">
          <span class="auth-dot"></span>
          <span class="auth-label">Admin</span>
        </div>
        <button class="nav-item nav-item--logout" (click)="auth.signOut()">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span class="nav-label">Sign out</span>
        </button>
      } @else {
        <a class="nav-item" routerLink="/login" routerLinkActive="is-active" (click)="closeSidebar()">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          <span class="nav-label">Admin login</span>
        </a>
      }
    </div>

  </aside>

  <!-- Main content -->
  <div class="main-wrapper">

    <!-- Mobile top bar -->
    <header class="topbar">
      <button class="hamburger" (click)="toggleSidebar()" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-brand">TIPBOARD</span>
    </header>

    <main class="main-content">
      <router-outlet />
    </main>

  </div>

</div>
